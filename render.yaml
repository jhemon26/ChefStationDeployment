databases:
  - name: chefstation-db
    databaseName: chefstation
    user: chefstation
    plan: free

services:
  - type: web
    name: chefstation-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: chefstation-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: http://localhost:3000,https://chefstation.netlify.app
      - key: SEED_SUPER_ADMIN_USERNAME
        value: adminemon@gmail.com
      - key: SEED_SUPER_ADMIN_PASSWORD
        value: change-this-in-render-env
      - key: UPLOAD_DIR
        value: /opt/render/project/uploads
