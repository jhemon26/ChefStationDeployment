[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the DigitalOcean backend.
# The browser calls https://chefstation.netlify.app/api/* and Netlify
# forwards them server-side — no mixed-content issue, no SSL needed on the droplet.
[[redirects]]
  from = "/api/*"
  to = "http://144.126.239.34:5001/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://144.126.239.34:5001/uploads/:splat"
  status = 200
  force = true

# SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
